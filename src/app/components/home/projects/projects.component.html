<div id="projects" class="relative z-50 border-t my-12 lg:my-24 border-[#25213b]">
    <div
        class="w-[100px] h-[100px] bg-violet-100 rounded-full absolute top-6 left-[42%] translate-x-1/2 filter blur-3xl opacity-20">
    </div>

    <div class="flex justify-center -translate-y-[1px]">
        <div class="w-3/4">
            <div class="h-[1px] bg-gradient-to-r from-transparent via-violet-500 to-transparent w-full"></div>
        </div>
    </div>

    <div class="flex justify-center my-5 lg:py-8">
        <div class="flex items-center">
            <span class="w-24 h-[2px] bg-[#1a1443]"></span>
            <span class="bg-[#1a1443] w-fit text-white p-2 px-5 text-xl rounded-md">
                Projects
            </span>
            <span class="w-24 h-[2px] bg-[#1a1443]"></span>
        </div>
    </div>

    <div class="pt-24">
        <div class="flex flex-col gap-6">
            <div *ngFor="let project of projects; let i = index" [id]="'sticky-card-' + (i + 1)"
                class="sticky-card w-full mx-auto max-w-2xl sticky">
                <div
                    class="box-border flex items-center justify-center rounded shadow-[0_0_30px_0_rgba(0,0,0,0.3)] transition-all duration-[0.5s]">
                    <app-project-card [project]="project"></app-project-card>
                </div>
            </div>
        </div>
    </div>
</div>
